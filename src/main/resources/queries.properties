connection_registry.find_by_id=SELECT connection_id, connection_cd, connection_nm, connection_nm AS effective_connection_nm, engine_cd, connection_type_cd, source_mode_cd, host_nm, port_nbr, database_nm, schema_nm_default, is_default_flg, is_active_flg, created_ts, created_by, updated_ts, updated_by FROM meta.data_connection WHERE client_id = :client_id AND connection_id = :connection_id

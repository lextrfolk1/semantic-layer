schema_registry.find_all=SELECT schema_cd, schema_nm, schema_nm AS effective_schema_nm, schema_purpose_txt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.schema_catalog WHERE client_id = :client_id AND (CAST(:lifecycle_status_cd AS varchar) IS NULL OR lifecycle_status_cd = :lifecycle_status_cd) ORDER BY schema_cd
schema_registry.find_by_code=SELECT schema_cd, schema_nm, schema_nm AS effective_schema_nm, schema_purpose_txt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.schema_catalog WHERE client_id = :client_id AND schema_cd = :schema_cd
connection_registry.find_all=SELECT connection_id, connection_cd, connection_nm, connection_nm AS effective_connection_nm, engine_cd, connection_type_cd, source_mode_cd, host_nm, port_nbr, database_nm, schema_nm_default, is_default_flg, is_active_flg, created_ts, created_by, updated_ts, updated_by FROM meta.data_connection WHERE client_id = :client_id AND (CAST(:engine_cd AS varchar) IS NULL OR engine_cd = :engine_cd) AND (CAST(:is_active_flg AS boolean) IS NULL OR is_active_flg = :is_active_flg) ORDER BY connection_cd
connection_registry.find_by_id=SELECT connection_id, connection_cd, connection_nm, connection_nm AS effective_connection_nm, engine_cd, connection_type_cd, source_mode_cd, host_nm, port_nbr, database_nm, schema_nm_default, is_default_flg, is_active_flg, created_ts, created_by, updated_ts, updated_by FROM meta.data_connection WHERE client_id = :client_id AND connection_id = :connection_id
object_registration.insert_draft_object=INSERT INTO meta.object_catalog (client_id, object_cd, object_nm, object_type_cd, schema_cd, connection_id, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by) VALUES (:client_id, :object_cd, :object_nm, :object_type_cd, :schema_cd, :connection_id, 'DRAFT', :created_ts, :created_by, :updated_ts, :updated_by) RETURNING CAST(md5(schema_cd || '/' || object_cd) AS uuid) AS object_id, client_id, object_cd, object_nm, object_type_cd, schema_cd, connection_id, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by -- RETURNING object_id, client_id, object_cd
object_registration.insert_attribute=INSERT INTO meta.attribute_catalog (schema_cd, object_cd, attribute_cd, physical_attribute_nm, canonical_data_type_cd, taxonomy_cd, taxonomy_source_cd, taxonomy_jurisdiction_cd, pk_flg, fk_flg, nullable_flg, created_ts, created_by, updated_ts, updated_by) SELECT schema_cd, object_cd, :attribute_cd, :attribute_nm, :data_type_cd, :taxonomy_cd, :taxonomy_source_cd, :taxonomy_jurisdiction_cd, :pk_flg, :fk_flg, :nullable_flg, :created_ts, :created_by, :updated_ts, :updated_by FROM meta.object_catalog WHERE CAST(md5(schema_cd || '/' || object_cd) AS uuid) = :object_id RETURNING CAST(md5(schema_cd || '/' || attribute_cd) AS uuid) AS attribute_id, CAST(md5(schema_cd || '/' || object_cd) AS uuid) AS object_id, :client_id AS client_id, attribute_cd, physical_attribute_nm AS attribute_nm, canonical_data_type_cd AS data_type_cd, taxonomy_cd, taxonomy_source_cd, taxonomy_jurisdiction_cd, pk_flg, fk_flg, nullable_flg, created_ts, created_by, updated_ts, updated_by
object_registration.insert_workflow_task=INSERT INTO wkfl.workflow_task (task_type_cd, entity_type_cd, entity_ref, task_status_cd, submitted_by, submitted_ts, client_id) VALUES (:workflow_type_cd, :entity_type_cd, CAST(:entity_id AS varchar), CASE WHEN :task_status_cd = 'PENDING_APPROVAL' THEN 'PENDING' ELSE :task_status_cd END, :created_by, :created_ts, :client_id) RETURNING CAST(md5(id::text) AS uuid) AS workflow_task_id, client_id, task_type_cd AS workflow_type_cd, entity_type_cd, CAST(entity_ref AS uuid) AS entity_id, CASE WHEN task_status_cd = 'PENDING' THEN 'PENDING_APPROVAL' ELSE task_status_cd END AS task_status_cd, submitted_ts AS created_ts, submitted_by AS created_by, submitted_ts AS updated_ts, submitted_by AS updated_by
object_registration.insert_metadata_change_history=INSERT INTO meta.metadata_change_history (entity_type_cd, entity_ref, change_type_cd, change_reason_txt, changed_by, changed_ts) VALUES (:entity_type_cd, CAST(:entity_id AS varchar), :change_type_cd, :change_summary_txt, :created_by, :created_ts) RETURNING CAST(md5(id::text) AS uuid) AS change_history_id, :client_id AS client_id, entity_type_cd, CAST(entity_ref AS uuid) AS entity_id, change_type_cd, change_reason_txt AS change_summary_txt, changed_ts AS created_ts, changed_by AS created_by
relationship_registration.insert_relationship=INSERT INTO meta.semantic_relationship_catalog (relationship_cd, parent_schema_cd, parent_object_cd, parent_attribute_cd, child_schema_cd, child_object_cd, child_attribute_cd, relationship_type_cd, cardinality_cd, join_type_cd, is_enforced_flg, is_nullable_flg, is_cross_engine_flg, relationship_desc, ai_join_guidance_txt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by) VALUES (:relationship_cd, :parent_schema_cd, :parent_object_cd, :parent_attribute_cd, :child_schema_cd, :child_object_cd, :child_attribute_cd, :relationship_type_cd, :cardinality_cd, :join_type_cd, :is_enforced_flg, :is_nullable_flg, :is_cross_engine_flg, :relationship_desc, :ai_join_guidance_txt, :lifecycle_status_cd, :created_ts, :created_by, :updated_ts, :updated_by) RETURNING id, relationship_cd, parent_schema_cd, parent_object_cd, parent_attribute_cd, child_schema_cd, child_object_cd, child_attribute_cd, relationship_type_cd, cardinality_cd, join_type_cd, is_enforced_flg, is_nullable_flg, is_cross_engine_flg, relationship_desc, ai_join_guidance_txt, neo4j_synced_ts, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by
relationship_registration.update_neo4j_projection_sync=UPDATE meta.semantic_relationship_catalog SET neo4j_synced_ts = :neo4j_synced_ts, updated_ts = :updated_ts, updated_by = :updated_by WHERE relationship_cd = :relationship_cd RETURNING id, relationship_cd, parent_schema_cd, parent_object_cd, parent_attribute_cd, child_schema_cd, child_object_cd, child_attribute_cd, relationship_type_cd, cardinality_cd, join_type_cd, is_enforced_flg, is_nullable_flg, is_cross_engine_flg, relationship_desc, ai_join_guidance_txt, neo4j_synced_ts, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by
attribute_pairing_registration.insert_pairing=INSERT INTO meta.attribute_pairing_catalog (pairing_cd, pairing_nm, schema_cd, object_cd, display_attribute_cd, filter_attribute_cd, pairing_type_cd, lookup_strategy_cd, lookup_inline_map_jsonb, lookup_sql_template_txt, lookup_cache_enabled_flg, lookup_cache_ttl_seconds_nbr, cardinality_cd, is_bidirectional_flg, is_cross_engine_flg, filter_attribute_indexed_flg, filter_attribute_index_type_cd, performance_gain_pct_est_nbr, ai_context_txt, client_id, lifecycle_status_cd, governance_review_status_cd, version_nbr, created_ts, created_by, updated_ts, updated_by) VALUES (:pairing_cd, :pairing_nm, :schema_cd, :object_cd, :display_attribute_cd, :filter_attribute_cd, :pairing_type_cd, :lookup_strategy_cd, CAST(:lookup_inline_map_jsonb AS jsonb), :lookup_sql_template_txt, :lookup_cache_enabled_flg, :lookup_cache_ttl_seconds_nbr, :cardinality_cd, :is_bidirectional_flg, :is_cross_engine_flg, :filter_attribute_indexed_flg, :filter_attribute_index_type_cd, :performance_gain_pct_est_nbr, :ai_context_txt, :client_id, :lifecycle_status_cd, :governance_review_status_cd, :version_nbr, :created_ts, :created_by, :updated_ts, :updated_by) RETURNING id, pairing_cd, pairing_nm, schema_cd, object_cd, display_attribute_cd, filter_attribute_cd, pairing_type_cd, lookup_strategy_cd, lookup_inline_map_jsonb, lookup_sql_template_txt, lookup_cache_enabled_flg, lookup_cache_ttl_seconds_nbr, cardinality_cd, is_bidirectional_flg, is_cross_engine_flg, filter_attribute_indexed_flg, filter_attribute_index_type_cd, performance_gain_pct_est_nbr, ai_context_txt, client_id, lifecycle_status_cd, governance_review_status_cd, version_nbr, created_ts, created_by, updated_ts, updated_by
attribute_pairing_registration.insert_workflow_task=INSERT INTO wkfl.workflow_task (task_type_cd, entity_type_cd, entity_ref, task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt) VALUES (:task_type_cd, :entity_type_cd, :entity_ref, CASE WHEN :task_status_cd = 'PENDING_APPROVAL' THEN 'PENDING' ELSE :task_status_cd END, :submitted_by, :submitted_ts, :assigned_to, :due_dt, :description_txt, :client_id, :approved_by, :approved_ts, :approval_note_txt) RETURNING id, task_type_cd, entity_type_cd, entity_ref, CASE WHEN task_status_cd = 'PENDING' THEN 'PENDING_APPROVAL' ELSE task_status_cd END AS task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt
attribute_pairing_registration.insert_metadata_change_history=INSERT INTO meta.metadata_change_history (entity_type_cd, entity_ref, change_type_cd, changed_by, changed_ts, old_value_json, new_value_json, change_reason_txt) VALUES (:entity_type_cd, :entity_ref, :change_type_cd, :changed_by, :changed_ts, CAST(:old_value_json AS jsonb), CAST(:new_value_json AS jsonb), :change_reason_txt) RETURNING id, entity_type_cd, entity_ref, change_type_cd, changed_by, changed_ts, old_value_json, new_value_json, change_reason_txt
attribute_pairing_resolution.find_pairing_by_code=SELECT id, pairing_cd, pairing_nm, schema_cd, object_cd, display_attribute_cd, filter_attribute_cd, pairing_type_cd, lookup_strategy_cd, lookup_inline_map_jsonb, lookup_sql_template_txt, lookup_cache_enabled_flg, lookup_cache_ttl_seconds_nbr, cardinality_cd, is_bidirectional_flg, is_cross_engine_flg, filter_attribute_indexed_flg, filter_attribute_index_type_cd, performance_gain_pct_est_nbr, ai_context_txt, client_id, lifecycle_status_cd, governance_review_status_cd, version_nbr, created_ts, created_by, updated_ts, updated_by FROM meta.attribute_pairing_catalog WHERE pairing_cd = :pairing_cd AND (client_id = :client_id OR client_id IS NULL)
attribute_pairing_resolution.find_active_pairing_by_display_attribute=SELECT id, pairing_cd, pairing_nm, schema_cd, object_cd, display_attribute_cd, filter_attribute_cd, pairing_type_cd, lookup_strategy_cd, lookup_inline_map_jsonb, lookup_sql_template_txt, lookup_cache_enabled_flg, lookup_cache_ttl_seconds_nbr, cardinality_cd, is_bidirectional_flg, is_cross_engine_flg, filter_attribute_indexed_flg, filter_attribute_index_type_cd, performance_gain_pct_est_nbr, ai_context_txt, client_id, lifecycle_status_cd, governance_review_status_cd, version_nbr, created_ts, created_by, updated_ts, updated_by FROM meta.attribute_pairing_catalog WHERE schema_cd = :schema_cd AND object_cd = :object_cd AND display_attribute_cd = :display_attribute_cd AND lifecycle_status_cd = 'ACTIVE' AND (client_id = :client_id OR client_id IS NULL) ORDER BY CASE WHEN client_id = :client_id THEN 0 ELSE 1 END, version_nbr DESC LIMIT 1
attribute_pairing_resolution.check_filter_attribute_index=SELECT EXISTS (SELECT 1 FROM pg_index i JOIN pg_attribute a ON a.attrelid = i.indrelid AND a.attnum = ANY(i.indkey) JOIN pg_class t ON t.oid = i.indrelid JOIN pg_namespace n ON n.oid = t.relnamespace WHERE LOWER(n.nspname) = LOWER(:schema_cd) AND LOWER(t.relname) = LOWER(:object_cd) AND LOWER(a.attname) = LOWER(:attribute_cd)) AS indexed_flg
attribute_pairing_cache.find_value=SELECT id, pairing_cd, client_id, display_value_txt, filter_value_txt, is_one_to_many_flg, hit_count_nbr, last_hit_ts, cached_ts, expires_ts FROM meta.attribute_pairing_value_cache WHERE pairing_cd = :pairing_cd AND display_value_txt = :display_value_txt AND (client_id = :client_id OR client_id = 'GLOBAL') AND (expires_ts IS NULL OR expires_ts > :as_of_ts) ORDER BY CASE WHEN client_id = :client_id THEN 0 ELSE 1 END LIMIT 1
attribute_pairing_cache.upsert_value=INSERT INTO meta.attribute_pairing_value_cache (pairing_cd, client_id, display_value_txt, filter_value_txt, is_one_to_many_flg, hit_count_nbr, last_hit_ts, cached_ts, expires_ts) VALUES (:pairing_cd, :client_id, :display_value_txt, :filter_value_txt, :is_one_to_many_flg, :hit_count_nbr, :last_hit_ts, :cached_ts, :expires_ts) ON CONFLICT (pairing_cd, display_value_txt, client_id) DO UPDATE SET filter_value_txt = EXCLUDED.filter_value_txt, is_one_to_many_flg = EXCLUDED.is_one_to_many_flg, hit_count_nbr = EXCLUDED.hit_count_nbr, last_hit_ts = EXCLUDED.last_hit_ts, cached_ts = EXCLUDED.cached_ts, expires_ts = EXCLUDED.expires_ts RETURNING id, pairing_cd, client_id, display_value_txt, filter_value_txt, is_one_to_many_flg, hit_count_nbr, last_hit_ts, cached_ts, expires_ts
attribute_pairing_cache.record_hit=UPDATE meta.attribute_pairing_value_cache SET hit_count_nbr = hit_count_nbr + 1, last_hit_ts = :last_hit_ts WHERE pairing_cd = :pairing_cd AND display_value_txt = :display_value_txt AND client_id = :client_id RETURNING id, pairing_cd, client_id, display_value_txt, filter_value_txt, is_one_to_many_flg, hit_count_nbr, last_hit_ts, cached_ts, expires_ts
filter_lookup_registration.insert_lookup=INSERT INTO meta.semantic_filter_lookup (lookup_cd, construction_type_cd, manual_subtype_cd, filter_obj, filter_condition_txt, filter_attr_cd, validation_obj, validation_attr_cd, suggested_target_attr_cd, execution_strategy_cd, max_input_set_size, max_output_rows, cache_ttl_min, review_period_days_override, rules_eligible_flg, qs_eligible_flg, ai_eligible_flg, replicate_to_ch_flg, description_txt, client_id, governance_status_cd, health_status_cd, next_review_due_dt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by) VALUES (:lookup_cd, :construction_type_cd, :manual_subtype_cd, :filter_obj, :filter_condition_txt, :filter_attr_cd, :validation_obj, :validation_attr_cd, :suggested_target_attr_cd, :execution_strategy_cd, :max_input_set_size, :max_output_rows, :cache_ttl_min, :review_period_days_override, :rules_eligible_flg, :qs_eligible_flg, :ai_eligible_flg, :replicate_to_ch_flg, :description_txt, :client_id, :governance_status_cd, :health_status_cd, :next_review_due_dt, :lifecycle_status_cd, :created_ts, :created_by, :updated_ts, :updated_by) RETURNING id, lookup_cd, construction_type_cd, manual_subtype_cd, filter_obj, filter_condition_txt, filter_attr_cd, validation_obj, validation_attr_cd, suggested_target_attr_cd, execution_strategy_cd, max_input_set_size, max_output_rows, cache_ttl_min, review_period_days_override, rules_eligible_flg, qs_eligible_flg, ai_eligible_flg, replicate_to_ch_flg, description_txt, client_id, governance_status_cd, health_status_cd, last_certified_ts, last_certified_by, next_review_due_dt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by
filter_lookup_registration.certify_lookup=UPDATE meta.semantic_filter_lookup SET health_status_cd = :health_status_cd, last_certified_ts = :last_certified_ts, last_certified_by = :last_certified_by, next_review_due_dt = :next_review_due_dt, updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND lookup_cd = :lookup_cd RETURNING id, lookup_cd, construction_type_cd, manual_subtype_cd, filter_obj, filter_condition_txt, filter_attr_cd, validation_obj, validation_attr_cd, suggested_target_attr_cd, execution_strategy_cd, max_input_set_size, max_output_rows, cache_ttl_min, review_period_days_override, rules_eligible_flg, qs_eligible_flg, ai_eligible_flg, replicate_to_ch_flg, description_txt, client_id, governance_status_cd, health_status_cd, last_certified_ts, last_certified_by, next_review_due_dt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by
filter_lookup_registration.insert_binding=INSERT INTO meta.filter_lookup_binding (lookup_cd, bound_obj, bound_attr_cd, binding_context_cd, binding_ref, bound_by, bound_ts, is_active_flg) VALUES (:lookup_cd, :bound_obj, :bound_attr_cd, :binding_context_cd, :binding_ref, :bound_by, :bound_ts, :is_active_flg) RETURNING id, lookup_cd, bound_obj, bound_attr_cd, binding_context_cd, binding_ref, bound_by, bound_ts, is_active_flg
filter_lookup_registration.insert_workflow_task=INSERT INTO wkfl.workflow_task (task_type_cd, entity_type_cd, entity_ref, task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt) VALUES (:task_type_cd, :entity_type_cd, :entity_ref, CASE WHEN :task_status_cd = 'PENDING_APPROVAL' THEN 'PENDING' ELSE :task_status_cd END, :submitted_by, :submitted_ts, :assigned_to, :due_dt, :description_txt, :client_id, :approved_by, :approved_ts, :approval_note_txt) RETURNING id, task_type_cd, entity_type_cd, entity_ref, CASE WHEN task_status_cd = 'PENDING' THEN 'PENDING_APPROVAL' ELSE task_status_cd END AS task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt
filter_lookup_registration.insert_metadata_change_history=INSERT INTO meta.metadata_change_history (entity_type_cd, entity_ref, change_type_cd, changed_by, changed_ts, old_value_json, new_value_json, change_reason_txt) VALUES (:entity_type_cd, :entity_ref, :change_type_cd, :changed_by, :changed_ts, CAST(:old_value_json AS jsonb), CAST(:new_value_json AS jsonb), :change_reason_txt) RETURNING id, entity_type_cd, entity_ref, change_type_cd, changed_by, changed_ts, old_value_json, new_value_json, change_reason_txt
governance_policy_preset.find_by_code=SELECT policy_cd, policy_nm, policy_scope_cd, default_value_txt, data_type_cd, is_overrideable_flg, override_requires_approval_flg, effective_from_dt, effective_to_dt, approved_by, approved_ts, created_ts, created_by FROM governance.policy_preset WHERE policy_cd = :policy_cd AND policy_scope_cd = :policy_scope_cd AND effective_from_dt <= :as_of_dt AND (effective_to_dt IS NULL OR effective_to_dt >= :as_of_dt)
governance_policy_preset.find_all=SELECT policy_cd, policy_nm, policy_scope_cd, default_value_txt, data_type_cd, is_overrideable_flg, override_requires_approval_flg, effective_from_dt, effective_to_dt, approved_by, approved_ts, created_ts, created_by FROM governance.policy_preset WHERE (CAST(:policy_scope_cd AS varchar) IS NULL OR policy_scope_cd = :policy_scope_cd) AND effective_from_dt <= :as_of_dt AND (effective_to_dt IS NULL OR effective_to_dt >= :as_of_dt) ORDER BY policy_cd
filter_lookup_effective_review.find_all=SELECT id, lookup_cd, construction_type_cd, manual_subtype_cd, filter_obj, filter_condition_txt, filter_attr_cd, validation_obj, validation_attr_cd, suggested_target_attr_cd, execution_strategy_cd, max_input_set_size, max_output_rows, cache_ttl_min, review_period_days_override, rules_eligible_flg, qs_eligible_flg, ai_eligible_flg, replicate_to_ch_flg, description_txt, client_id, governance_status_cd, health_status_cd, last_certified_ts, last_certified_by, next_review_due_dt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.semantic_filter_lookup WHERE client_id = :client_id AND (CAST(:governance_status_cd AS varchar) IS NULL OR governance_status_cd = :governance_status_cd) AND (CAST(:health_status_cd AS varchar) IS NULL OR health_status_cd = :health_status_cd) AND (CAST(:lifecycle_status_cd AS varchar) IS NULL OR lifecycle_status_cd = :lifecycle_status_cd) ORDER BY lookup_cd
filter_lookup_effective_review.find_lookup_by_code=SELECT id, lookup_cd, construction_type_cd, manual_subtype_cd, filter_obj, filter_condition_txt, filter_attr_cd, validation_obj, validation_attr_cd, suggested_target_attr_cd, execution_strategy_cd, max_input_set_size, max_output_rows, cache_ttl_min, review_period_days_override, rules_eligible_flg, qs_eligible_flg, ai_eligible_flg, replicate_to_ch_flg, description_txt, client_id, governance_status_cd, health_status_cd, last_certified_ts, last_certified_by, next_review_due_dt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.semantic_filter_lookup WHERE client_id = :client_id AND lookup_cd = :lookup_cd
filter_lookup_effective_review.find_manual_values_by_lookup=SELECT flv.lookup_cd, sfl.client_id, flv.value_cd, flv.value_desc, flv.lifecycle_status_cd, flv.validated_flg, flv.anticipated_dt, flv.workflow_ref, flv.last_seen_in_source_ts, flv.auto_expire_after_days, flv.alert_txt, flv.added_by, flv.added_ts, flv.certified_by, flv.certified_ts, flv.updated_ts FROM meta.filter_lookup_value flv JOIN meta.semantic_filter_lookup sfl ON sfl.lookup_cd = flv.lookup_cd WHERE sfl.client_id = :client_id AND flv.lookup_cd = :lookup_cd AND flv.lifecycle_status_cd IN ('ACTIVE','ANTICIPATED') ORDER BY CASE flv.lifecycle_status_cd WHEN 'ACTIVE' THEN 0 WHEN 'ANTICIPATED' THEN 1 ELSE 2 END, flv.value_cd
filter_lookup_effective_review.find_sql_values_template=SELECT DISTINCT :lookup_cd AS lookup_cd, :client_id AS client_id, CAST(%1$s AS varchar(100)) AS value_cd, CAST(%1$s AS text) AS value_desc, 'ACTIVE' AS lifecycle_status_cd, TRUE AS validated_flg, NULL::date AS anticipated_dt, NULL::varchar(60) AS workflow_ref, NULL::timestamptz AS last_seen_in_source_ts, NULL::integer AS auto_expire_after_days, NULL::text AS alert_txt, NULL::varchar(100) AS added_by, NULL::timestamptz AS added_ts, NULL::varchar(100) AS certified_by, NULL::timestamptz AS certified_ts, NULL::timestamptz AS updated_ts FROM %2$s WHERE %3$s ORDER BY value_cd LIMIT :max_output_rows
filter_lookup_effective_review.count_values_by_lookup=SELECT flv.lookup_cd, sfl.client_id, COUNT(*) AS value_count FROM meta.filter_lookup_value flv JOIN meta.semantic_filter_lookup sfl ON sfl.lookup_cd = flv.lookup_cd WHERE sfl.client_id = :client_id AND flv.lookup_cd = :lookup_cd AND flv.lifecycle_status_cd IN ('ACTIVE','ANTICIPATED') GROUP BY flv.lookup_cd, sfl.client_id
filter_lookup_effective_review.count_stale_values_by_lookup=SELECT flv.lookup_cd, sfl.client_id, COUNT(*) AS stale_value_count FROM meta.filter_lookup_value flv JOIN meta.semantic_filter_lookup sfl ON sfl.lookup_cd = flv.lookup_cd WHERE sfl.client_id = :client_id AND flv.lookup_cd = :lookup_cd AND flv.lifecycle_status_cd = 'INACTIVE_IN_SOURCE' GROUP BY flv.lookup_cd, sfl.client_id
filter_lookup_exec_log.insert_execution=INSERT INTO meta.filter_lookup_exec_log (lookup_cd, executed_by, executed_ts, phase1_duration_ms, phase1_row_count, phase1_cache_hit_flg, execution_strategy_used_cd, phase2_duration_ms, result_status_cd, error_txt, blocked_by_policy_cd) VALUES (:lookup_cd, :executed_by, :executed_ts, :phase1_duration_ms, :phase1_row_count, :phase1_cache_hit_flg, :execution_strategy_used_cd, :phase2_duration_ms, :result_status_cd, :error_txt, :blocked_by_policy_cd) RETURNING id, lookup_cd, executed_by, executed_ts, phase1_duration_ms, phase1_row_count, phase1_cache_hit_flg, execution_strategy_used_cd, phase2_duration_ms, result_status_cd, error_txt, blocked_by_policy_cd
object_exposure.find_all=SELECT CAST(md5(schema_cd || '/' || object_cd) AS uuid) AS object_id, client_id, object_cd, object_nm, object_nm AS effective_object_nm, object_type_cd, schema_cd, connection_id, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.object_catalog WHERE client_id = :client_id AND (CAST(:schema_cd AS varchar) IS NULL OR schema_cd = :schema_cd) AND (CAST(:lifecycle_status_cd AS varchar) IS NULL OR lifecycle_status_cd = :lifecycle_status_cd) ORDER BY object_cd
object_exposure.find_by_id=SELECT CAST(md5(schema_cd || '/' || object_cd) AS uuid) AS object_id, client_id, object_cd, object_nm, object_nm AS effective_object_nm, object_type_cd, schema_cd, connection_id, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.object_catalog WHERE client_id = :client_id AND CAST(md5(schema_cd || '/' || object_cd) AS uuid) = :object_id -- object_id = :object_id
object_exposure.find_by_schema_and_code=SELECT CAST(md5(schema_cd || '/' || object_cd) AS uuid) AS object_id, client_id, object_cd, object_nm, object_nm AS effective_object_nm, object_type_cd, schema_cd, connection_id, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.object_catalog WHERE schema_cd = :schema_cd AND object_cd = :object_cd
object_exposure.find_attributes_by_object_id=SELECT CAST(md5(a.schema_cd || '/' || a.attribute_cd) AS uuid) AS attribute_id, CAST(md5(a.schema_cd || '/' || a.object_cd) AS uuid) AS object_id, o.client_id, a.attribute_cd, a.physical_attribute_nm AS attribute_nm, a.physical_attribute_nm AS effective_attribute_nm, a.canonical_data_type_cd AS data_type_cd, a.taxonomy_cd, a.taxonomy_source_cd, a.taxonomy_jurisdiction_cd, a.created_ts, a.created_by, a.updated_ts, a.updated_by FROM meta.attribute_catalog a JOIN meta.object_catalog o ON o.schema_cd = a.schema_cd AND o.object_cd = a.object_cd WHERE (o.client_id = :client_id OR o.client_id IS NULL) AND CAST(md5(a.schema_cd || '/' || a.object_cd) AS uuid) = :object_id ORDER BY a.attribute_cd
workflow_approval.find_task_by_id=SELECT id, task_type_cd, entity_type_cd, entity_ref, CASE WHEN task_status_cd = 'PENDING' THEN 'PENDING_APPROVAL' ELSE task_status_cd END AS task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt FROM wkfl.workflow_task WHERE client_id = :client_id AND id = :id
workflow_approval.find_task_by_id_only=SELECT id, task_type_cd, entity_type_cd, entity_ref, CASE WHEN task_status_cd = 'PENDING' THEN 'PENDING_APPROVAL' ELSE task_status_cd END AS task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt FROM wkfl.workflow_task WHERE id = :id
workflow_approval.approve_task=UPDATE wkfl.workflow_task SET task_status_cd = CASE WHEN :task_status_cd = 'PENDING_APPROVAL' THEN 'PENDING' ELSE :task_status_cd END, approved_by = :approved_by, approved_ts = :approved_ts, approval_note_txt = :approval_note_txt WHERE client_id = :client_id AND id = :id AND task_status_cd = 'PENDING' RETURNING id, task_type_cd, entity_type_cd, entity_ref, CASE WHEN task_status_cd = 'PENDING' THEN 'PENDING_APPROVAL' ELSE task_status_cd END AS task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt
workflow_approval.reject_task=UPDATE wkfl.workflow_task SET task_status_cd = 'REJECTED', approved_by = :rejected_by, approved_ts = :rejected_ts, approval_note_txt = :rejection_note_txt WHERE id = :id AND task_status_cd = 'PENDING' RETURNING id, task_type_cd, entity_type_cd, entity_ref, CASE WHEN task_status_cd = 'PENDING' THEN 'PENDING_APPROVAL' ELSE task_status_cd END AS task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt
workflow_approval.approve_lookup=UPDATE meta.semantic_filter_lookup SET governance_status_cd = :governance_status_cd, lifecycle_status_cd = 'APPROVED', updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND lookup_cd = :lookup_cd RETURNING id, lookup_cd, governance_status_cd, updated_ts, updated_by
workflow_approval.approve_attribute_override=UPDATE meta.attribute_logical_name_override SET override_status_cd = :lifecycle_status_cd, updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND id = :id RETURNING id, client_id, attribute_cd, override_nm, override_status_cd, updated_ts, updated_by
workflow_approval.approve_filter_lookup_value=UPDATE meta.filter_lookup_value SET lifecycle_status_cd = :lifecycle_status_cd, validated_flg = :validated_flg, updated_ts = :updated_ts WHERE lookup_cd = :lookup_cd AND value_cd = :value_cd RETURNING lookup_cd, value_cd, lifecycle_status_cd, validated_flg, updated_ts
workflow_approval.approve_object=UPDATE meta.object_catalog SET lifecycle_status_cd = 'APPROVED', governance_review_status_cd = 'APPROVED', updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND CAST(md5(schema_cd || '/' || object_cd) AS uuid) = CAST(:object_id AS uuid)
workflow_approval.approve_pairing=UPDATE meta.attribute_pairing_catalog SET lifecycle_status_cd = 'APPROVED', governance_review_status_cd = 'APPROVED', updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND pairing_cd = :pairing_cd
workflow_approval.approve_relationship=UPDATE meta.semantic_relationship_catalog SET lifecycle_status_cd = 'APPROVED', updated_ts = :updated_ts, updated_by = :updated_by WHERE relationship_cd = :relationship_cd
workflow_approval.reject_lookup=UPDATE meta.semantic_filter_lookup SET governance_status_cd = 'SUSPENDED', lifecycle_status_cd = 'REJECTED', updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND lookup_cd = :lookup_cd
workflow_approval.reject_attribute_override=UPDATE meta.attribute_logical_name_override SET override_status_cd = 'REJECTED', updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND id = :id
workflow_approval.reject_object=UPDATE meta.object_catalog SET lifecycle_status_cd = 'DRAFT', governance_review_status_cd = 'REJECTED', updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND CAST(md5(schema_cd || '/' || object_cd) AS uuid) = CAST(:object_id AS uuid)
workflow_approval.reject_pairing=UPDATE meta.attribute_pairing_catalog SET lifecycle_status_cd = 'DRAFT', governance_review_status_cd = 'REJECTED', updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND pairing_cd = :pairing_cd
workflow_approval.reject_relationship=UPDATE meta.semantic_relationship_catalog SET lifecycle_status_cd = 'REJECTED', updated_ts = :updated_ts, updated_by = :updated_by WHERE relationship_cd = :relationship_cd
schema_registry.introspect_columns=SELECT c.column_name, c.data_type, c.is_nullable, (CASE WHEN tc.constraint_type = 'PRIMARY KEY' THEN TRUE ELSE FALSE END) AS is_pk FROM information_schema.columns c LEFT JOIN information_schema.key_column_usage kcu ON c.table_schema = kcu.table_schema AND c.table_name = kcu.table_name AND c.column_name = kcu.column_name LEFT JOIN information_schema.table_constraints tc ON kcu.constraint_name = tc.constraint_name AND kcu.table_schema = tc.table_schema AND tc.constraint_type = 'PRIMARY KEY' WHERE c.table_schema = :schema_cd AND c.table_name = :table_cd ORDER BY c.ordinal_position
schema_registry.introspect_tables=SELECT table_name AS obj, (CASE WHEN table_type = 'VIEW' THEN 'VIEW' ELSE 'TABLE' END) AS type FROM information_schema.tables WHERE table_schema = :schema_cd AND table_type IN ('BASE TABLE', 'VIEW') ORDER BY table_name
tenant_workspace.find_all=SELECT tw.id, tw.workspace_cd, tw.tenant_cd, tw.workspace_nm, tw.workspace_desc, tw.workspace_status_cd, tw.created_by, tw.created_ts, tw.updated_by, tw.updated_ts FROM meta.tenant_workspace tw WHERE (CAST(:tenant_cd AS varchar) IS NULL OR tw.tenant_cd = :tenant_cd OR tw.tenant_cd = 'GLOBAL') ORDER BY tw.workspace_cd
tenant_workspace.insert=INSERT INTO meta.tenant_workspace (workspace_cd, tenant_cd, workspace_nm, workspace_desc, workspace_status_cd, created_by) VALUES (:workspace_cd, :tenant_cd, :workspace_nm, :workspace_desc, :workspace_status_cd, :created_by) RETURNING id, workspace_cd, tenant_cd, workspace_nm, workspace_desc, workspace_status_cd, created_by, created_ts, updated_by, updated_ts
workspace_object.find_by_workspace=SELECT wo.id, wo.workspace_cd, wo.schema_cd, wo.object_cd, wo.added_by, wo.added_ts FROM meta.workspace_object wo WHERE wo.workspace_cd = :workspace_cd ORDER BY wo.schema_cd, wo.object_cd
workspace_object.insert=INSERT INTO meta.workspace_object (workspace_cd, schema_cd, object_cd, added_by) VALUES (:workspace_cd, :schema_cd, :object_cd, :added_by) RETURNING id, workspace_cd, schema_cd, object_cd, added_by, added_ts
workspace_object.delete=DELETE FROM meta.workspace_object WHERE workspace_cd = :workspace_cd AND schema_cd = :schema_cd AND object_cd = :object_cd
logical_hierarchy.find_all=SELECT lh.id, lh.hierarchy_cd, lh.hierarchy_nm, lh.tenant_cd, lh.hierarchy_status_cd, lh.created_by, lh.created_ts, lh.updated_by, lh.updated_ts FROM meta.logical_hierarchy lh WHERE (CAST(:tenant_cd AS varchar) IS NULL OR lh.tenant_cd = :tenant_cd OR lh.tenant_cd = 'GLOBAL') ORDER BY lh.hierarchy_cd
logical_hierarchy.insert=INSERT INTO meta.logical_hierarchy (hierarchy_cd, hierarchy_nm, tenant_cd, hierarchy_status_cd, created_by) VALUES (:hierarchy_cd, :hierarchy_nm, :tenant_cd, :hierarchy_status_cd, :created_by) RETURNING id, hierarchy_cd, hierarchy_nm, tenant_cd, hierarchy_status_cd, created_by, created_ts, updated_by, updated_ts
logical_hierarchy.find_levels=SELECT lhl.id, lhl.hierarchy_cd, lhl.level_nbr, lhl.level_label, lhl.attribute_cd, lhl.code_cd, lhl.object_ref FROM meta.logical_hierarchy_level lhl WHERE lhl.hierarchy_cd = :hierarchy_cd ORDER BY lhl.level_nbr
logical_hierarchy.insert_level=INSERT INTO meta.logical_hierarchy_level (hierarchy_cd, level_nbr, level_label, attribute_cd, code_cd, object_ref) VALUES (:hierarchy_cd, :level_nbr, :level_label, :attribute_cd, :code_cd, :object_ref) RETURNING id, hierarchy_cd, level_nbr, level_label, attribute_cd, code_cd, object_ref
workflow_task.find_all=SELECT id, task_type_cd, entity_type_cd, entity_ref, CASE WHEN task_status_cd = 'PENDING' THEN 'PENDING_APPROVAL' ELSE task_status_cd END AS task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt FROM wkfl.workflow_task WHERE (CAST(:client_id AS varchar) IS NULL OR client_id = :client_id) ORDER BY submitted_ts DESC
workflow_task.reject=UPDATE wkfl.workflow_task SET task_status_cd = 'REJECTED', approved_by = :rejected_by, approved_ts = :rejected_ts, approval_note_txt = :rejection_note_txt WHERE id = :id AND task_status_cd = 'PENDING' RETURNING id, task_type_cd, entity_type_cd, entity_ref, CASE WHEN task_status_cd = 'PENDING' THEN 'PENDING_APPROVAL' ELSE task_status_cd END AS task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt
attribute_pairing.find_all=SELECT id, pairing_cd, pairing_nm, schema_cd, object_cd, display_attribute_cd, filter_attribute_cd, pairing_type_cd, lookup_strategy_cd, cardinality_cd, is_bidirectional_flg, is_cross_engine_flg, filter_attribute_indexed_flg, performance_gain_pct_est_nbr, ai_context_txt, client_id, lifecycle_status_cd, governance_review_status_cd, version_nbr, created_ts, created_by, updated_ts, updated_by FROM meta.attribute_pairing_catalog WHERE (CAST(:client_id AS varchar) IS NULL OR client_id = :client_id OR client_id IS NULL) ORDER BY pairing_cd
semantic_relationship.find_all=SELECT id, relationship_cd, parent_schema_cd, parent_object_cd, parent_attribute_cd, child_schema_cd, child_object_cd, child_attribute_cd, relationship_type_cd, cardinality_cd, join_type_cd, is_enforced_flg, is_nullable_flg, is_cross_engine_flg, relationship_desc, ai_join_guidance_txt, neo4j_synced_ts, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.semantic_relationship_catalog WHERE (CAST(:lifecycle_status_cd AS varchar) IS NULL OR lifecycle_status_cd = :lifecycle_status_cd) ORDER BY relationship_cd

schema_registry.find_all=SELECT schema_cd, schema_nm, schema_purpose_txt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.schema_catalog WHERE client_id = :client_id AND (:lifecycle_status_cd IS NULL OR lifecycle_status_cd = :lifecycle_status_cd) ORDER BY schema_cd
schema_registry.find_by_code=SELECT schema_cd, schema_nm, schema_purpose_txt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.schema_catalog WHERE client_id = :client_id AND schema_cd = :schema_cd
connection_registry.find_all=SELECT connection_id, connection_cd, connection_nm, engine_cd, connection_type_cd, source_mode_cd, host_nm, port_nbr, database_nm, schema_nm_default, is_default_flg, is_active_flg, created_ts, created_by, updated_ts, updated_by FROM meta.data_connection WHERE client_id = :client_id AND (:engine_cd IS NULL OR engine_cd = :engine_cd) AND (:is_active_flg IS NULL OR is_active_flg = :is_active_flg) ORDER BY connection_cd
connection_registry.find_by_id=SELECT connection_id, connection_cd, connection_nm, engine_cd, connection_type_cd, source_mode_cd, host_nm, port_nbr, database_nm, schema_nm_default, is_default_flg, is_active_flg, created_ts, created_by, updated_ts, updated_by FROM meta.data_connection WHERE client_id = :client_id AND connection_id = :connection_id

filter_lookup_registration.insert_workflow_task=INSERT INTO wkfl.workflow_task (task_type_cd, entity_type_cd, entity_ref, task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt) VALUES (:task_type_cd, :entity_type_cd, :entity_ref, :task_status_cd, :submitted_by, :submitted_ts, :assigned_to, :due_dt, :description_txt, :client_id, :approved_by, :approved_ts, :approval_note_txt) RETURNING id, task_type_cd, entity_type_cd, entity_ref, task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt
filter_lookup_registration.insert_metadata_change_history=INSERT INTO meta.metadata_change_history (entity_type_cd, entity_ref, change_type_cd, changed_by, changed_ts, old_value_json, new_value_json, change_reason_txt) VALUES (:entity_type_cd, :entity_ref, :change_type_cd, :changed_by, :changed_ts, CAST(:old_value_json AS jsonb), CAST(:new_value_json AS jsonb), :change_reason_txt) RETURNING id, entity_type_cd, entity_ref, change_type_cd, changed_by, changed_ts, old_value_json, new_value_json, change_reason_txt
governance_policy_preset.find_by_code=SELECT policy_cd, policy_nm, policy_scope_cd, default_value_txt, data_type_cd, is_overrideable_flg, override_requires_approval_flg, effective_from_dt, effective_to_dt, approved_by, approved_ts, created_ts, created_by FROM governance.policy_preset WHERE policy_cd = :policy_cd AND policy_scope_cd = :policy_scope_cd AND effective_from_dt <= :as_of_dt AND (effective_to_dt IS NULL OR effective_to_dt >= :as_of_dt)
governance_policy_preset.find_all=SELECT policy_cd, policy_nm, policy_scope_cd, default_value_txt, data_type_cd, is_overrideable_flg, override_requires_approval_flg, effective_from_dt, effective_to_dt, approved_by, approved_ts, created_ts, created_by FROM governance.policy_preset WHERE (:policy_scope_cd IS NULL OR policy_scope_cd = :policy_scope_cd) AND effective_from_dt <= :as_of_dt AND (effective_to_dt IS NULL OR effective_to_dt >= :as_of_dt) ORDER BY policy_cd
filter_lookup_effective_review.find_all=SELECT id, lookup_cd, construction_type_cd, manual_subtype_cd, filter_obj, filter_condition_txt, filter_attr_cd, validation_obj, validation_attr_cd, suggested_target_attr_cd, execution_strategy_cd, max_input_set_size, max_output_rows, cache_ttl_min, review_period_days_override, rules_eligible_flg, qs_eligible_flg, ai_eligible_flg, replicate_to_ch_flg, description_txt, client_id, governance_status_cd, health_status_cd, last_certified_ts, last_certified_by, next_review_due_dt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.semantic_filter_lookup WHERE client_id = :client_id AND (:governance_status_cd IS NULL OR governance_status_cd = :governance_status_cd) AND (:health_status_cd IS NULL OR health_status_cd = :health_status_cd) AND (:lifecycle_status_cd IS NULL OR lifecycle_status_cd = :lifecycle_status_cd) ORDER BY lookup_cd
filter_lookup_effective_review.find_lookup_by_code=SELECT id, lookup_cd, construction_type_cd, manual_subtype_cd, filter_obj, filter_condition_txt, filter_attr_cd, validation_obj, validation_attr_cd, suggested_target_attr_cd, execution_strategy_cd, max_input_set_size, max_output_rows, cache_ttl_min, review_period_days_override, rules_eligible_flg, qs_eligible_flg, ai_eligible_flg, replicate_to_ch_flg, description_txt, client_id, governance_status_cd, health_status_cd, last_certified_ts, last_certified_by, next_review_due_dt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.semantic_filter_lookup WHERE client_id = :client_id AND lookup_cd = :lookup_cd
filter_lookup_effective_review.find_manual_values_by_lookup=SELECT flv.lookup_cd, sfl.client_id, flv.value_cd, flv.value_desc, flv.lifecycle_status_cd, flv.validated_flg, flv.anticipated_dt, flv.workflow_ref, flv.last_seen_in_source_ts, flv.auto_expire_after_days, flv.alert_txt, flv.added_by, flv.added_ts, flv.certified_by, flv.certified_ts, flv.updated_ts FROM meta.filter_lookup_value flv JOIN meta.semantic_filter_lookup sfl ON sfl.lookup_cd = flv.lookup_cd WHERE sfl.client_id = :client_id AND flv.lookup_cd = :lookup_cd AND flv.lifecycle_status_cd IN ('ACTIVE','ANTICIPATED') ORDER BY CASE flv.lifecycle_status_cd WHEN 'ACTIVE' THEN 0 WHEN 'ANTICIPATED' THEN 1 ELSE 2 END, flv.value_cd
filter_lookup_effective_review.find_sql_values_template=SELECT DISTINCT :lookup_cd AS lookup_cd, :client_id AS client_id, CAST(%1$s AS varchar(100)) AS value_cd, CAST(%1$s AS text) AS value_desc, 'ACTIVE' AS lifecycle_status_cd, TRUE AS validated_flg, NULL::date AS anticipated_dt, NULL::varchar(60) AS workflow_ref, NULL::timestamptz AS last_seen_in_source_ts, NULL::integer AS auto_expire_after_days, NULL::text AS alert_txt, NULL::varchar(100) AS added_by, NULL::timestamptz AS added_ts, NULL::varchar(100) AS certified_by, NULL::timestamptz AS certified_ts, NULL::timestamptz AS updated_ts FROM %2$s WHERE %3$s ORDER BY value_cd LIMIT :max_output_rows
filter_lookup_effective_review.count_values_by_lookup=SELECT flv.lookup_cd, sfl.client_id, COUNT(*) AS value_count FROM meta.filter_lookup_value flv JOIN meta.semantic_filter_lookup sfl ON sfl.lookup_cd = flv.lookup_cd WHERE sfl.client_id = :client_id AND flv.lookup_cd = :lookup_cd AND flv.lifecycle_status_cd IN ('ACTIVE','ANTICIPATED') GROUP BY flv.lookup_cd, sfl.client_id
filter_lookup_effective_review.count_stale_values_by_lookup=SELECT flv.lookup_cd, sfl.client_id, COUNT(*) AS stale_value_count FROM meta.filter_lookup_value flv JOIN meta.semantic_filter_lookup sfl ON sfl.lookup_cd = flv.lookup_cd WHERE sfl.client_id = :client_id AND flv.lookup_cd = :lookup_cd AND flv.lifecycle_status_cd = 'INACTIVE_IN_SOURCE' GROUP BY flv.lookup_cd, sfl.client_id
filter_lookup_exec_log.insert_execution=INSERT INTO meta.filter_lookup_exec_log (lookup_cd, executed_by, executed_ts, phase1_duration_ms, phase1_row_count, phase1_cache_hit_flg, execution_strategy_used_cd, phase2_duration_ms, result_status_cd, error_txt, blocked_by_policy_cd) VALUES (:lookup_cd, :executed_by, :executed_ts, :phase1_duration_ms, :phase1_row_count, :phase1_cache_hit_flg, :execution_strategy_used_cd, :phase2_duration_ms, :result_status_cd, :error_txt, :blocked_by_policy_cd) RETURNING id, lookup_cd, executed_by, executed_ts, phase1_duration_ms, phase1_row_count, phase1_cache_hit_flg, execution_strategy_used_cd, phase2_duration_ms, result_status_cd, error_txt, blocked_by_policy_cd
object_exposure.find_all=SELECT object_id, client_id, object_cd, object_nm, object_nm AS effective_object_nm, object_type_cd, schema_cd, connection_id, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.object_catalog WHERE client_id = :client_id AND (:schema_cd IS NULL OR schema_cd = :schema_cd) AND (:lifecycle_status_cd IS NULL OR lifecycle_status_cd = :lifecycle_status_cd) ORDER BY object_cd
object_exposure.find_by_id=SELECT object_id, client_id, object_cd, object_nm, object_nm AS effective_object_nm, object_type_cd, schema_cd, connection_id, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.object_catalog WHERE client_id = :client_id AND object_id = :object_id
object_exposure.find_by_schema_and_code=SELECT object_id, client_id, object_cd, object_nm, object_nm AS effective_object_nm, object_type_cd, schema_cd, connection_id, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.object_catalog WHERE schema_cd = :schema_cd AND object_cd = :object_cd
object_exposure.find_attributes_by_object_id=SELECT attribute_id, object_id, client_id, attribute_cd, attribute_nm, attribute_nm AS effective_attribute_nm, data_type_cd, taxonomy_cd, taxonomy_source_cd, taxonomy_jurisdiction_cd, created_ts, created_by, updated_ts, updated_by FROM meta.attribute_catalog WHERE client_id = :client_id AND object_id = :object_id ORDER BY attribute_cd
workflow_approval.find_task_by_id=SELECT id, task_type_cd, entity_type_cd, entity_ref, task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt FROM wkfl.workflow_task WHERE client_id = :client_id AND id = :id
workflow_approval.approve_task=UPDATE wkfl.workflow_task SET task_status_cd = :task_status_cd, approved_by = :approved_by, approved_ts = :approved_ts, approval_note_txt = :approval_note_txt WHERE client_id = :client_id AND id = :id AND task_status_cd = 'PENDING' RETURNING id, task_type_cd, entity_type_cd, entity_ref, task_status_cd, submitted_by, submitted_ts, assigned_to, due_dt, description_txt, client_id, approved_by, approved_ts, approval_note_txt
workflow_approval.approve_lookup=UPDATE meta.semantic_filter_lookup SET governance_status_cd = :governance_status_cd, updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND lookup_cd = :lookup_cd RETURNING id, lookup_cd, governance_status_cd, updated_ts, updated_by
workflow_approval.approve_attribute_override=UPDATE meta.attribute_logical_name_override SET lifecycle_status_cd = :lifecycle_status_cd, updated_ts = :updated_ts, updated_by = :updated_by WHERE client_id = :client_id AND id = :id RETURNING id, client_id, attribute_cd, logical_name_override, lifecycle_status_cd, updated_ts, updated_by
workflow_approval.approve_filter_lookup_value=UPDATE meta.filter_lookup_value SET lifecycle_status_cd = :lifecycle_status_cd, validated_flg = :validated_flg, updated_ts = :updated_ts WHERE lookup_cd = :lookup_cd AND value_cd = :value_cd RETURNING lookup_cd, value_cd, lifecycle_status_cd, validated_flg, updated_ts

schema_registry.find_all=SELECT schema_cd, schema_nm, schema_nm AS effective_schema_nm, schema_purpose_txt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.schema_catalog WHERE client_id = :client_id AND (:lifecycle_status_cd IS NULL OR lifecycle_status_cd = :lifecycle_status_cd) ORDER BY schema_cd
schema_registry.find_by_code=SELECT schema_cd, schema_nm, schema_nm AS effective_schema_nm, schema_purpose_txt, lifecycle_status_cd, created_ts, created_by, updated_ts, updated_by FROM meta.schema_catalog WHERE client_id = :client_id AND schema_cd = :schema_cd

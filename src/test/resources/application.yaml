spring:
  config:
    import: ""
  cloud:
    config:
      enabled: false
      fail-fast: false
    bootstrap:
      enabled: false
  flyway:
    enabled: false
app:
  datasource:
    primary: primaryDataSource
    datasources:
      primaryDataSource:
        url: jdbc:h2:mem:semantic-layer;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
        username: sa
        password:
        driver-class-name: org.h2.Driver
        additional-properties:
          maximum-pool-size: 5
          minimum-idle: 1
          pool-name: HikariPool-Test
logging:
  level:
    com.lextr.semanticlayer: INFO
